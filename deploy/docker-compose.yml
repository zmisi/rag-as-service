# Local dev stack: PostgreSQL + API + Web
# Usage (from repo root):
#   cp deploy/.env.example .env
#   docker compose -f deploy/docker-compose.yml up --build

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_app}
      POSTGRES_DB: ${POSTGRES_DB:-lxzxai_rag}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-rag_app} -d ${POSTGRES_DB:-lxzxai_rag}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      args:
        INSTALL_DOCLING: ${INSTALL_DOCLING:-0}
        # Default Tsinghua mirror; set PIP_INDEX_URL= for official PyPI
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
    restart: unless-stopped
    # Repo-root .env (compose file lives under deploy/; without this,
    # ${QWEN_API_KEY} interpolates empty and chat fails).
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-rag_app}:${POSTGRES_PASSWORD:-rag_app}@db:5432/${POSTGRES_DB:-lxzxai_rag}
      AUTO_MIGRATE: ${AUTO_MIGRATE:-true}
      SECRET_KEY: ${SECRET_KEY:-change_me}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-pb_session}
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-.lxzxai.com}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-14}
      APEX_HOST: ${APEX_HOST:-lxzxai.com}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      # Prefer values from env_file (../.env). Do not set QWEN_API_KEY here
      # with ${QWEN_API_KEY:-} — empty interpolation would override env_file.
      INDEX_SYNC_ON_PUBLISH: ${INDEX_SYNC_ON_PUBLISH:-false}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ../apps/api/src:/app/src
      - ../apps/api/pyproject.toml:/app/pyproject.toml
      - ../apps/api/alembic:/app/alembic
      - ../apps/api/alembic.ini:/app/alembic.ini
      - api_storage:/app/var/storage
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn rag_api.main:app --reload --host 0.0.0.0 --port 8000

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      API_BACKEND_URL: http://api:8000
      WEB_PORT: 3000
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ../apps/web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  pgdata:
  api_storage:
  web_node_modules:
